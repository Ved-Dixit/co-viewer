<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Co-Viewer AV Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f172a;
      --card: rgba(30, 41, 59, 0.7);
      --primary: #8b5cf6;
      --secondary: #0d9488;
      --text: #f8fafc;
      --danger: #ef4444;
    }
    body { 
      margin: 0; 
      padding: 0; 
      background: var(--bg); 
      color: var(--text); 
      font-family: 'Outfit', sans-serif; 
      height: 100vh; 
      overflow: hidden; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
    }
    .container { 
      position: relative; 
      width: 100%; 
      height: 100%; 
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    video { 
      width: 100%; 
      height: 100%; 
      object-fit: cover; 
      filter: drop-shadow(0 0 20px rgba(139, 92, 246, 0.2));
    }
    .controls { 
      position: absolute; 
      bottom: 20px; 
      display: flex; 
      gap: 12px; 
      z-index: 10; 
      padding: 10px 20px;
      background: var(--card);
      backdrop-filter: blur(12px);
      border-radius: 40px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    button { 
      background: transparent; 
      border: 1px solid rgba(255,255,255,0.2); 
      color: white; 
      width: 44px;
      height: 44px;
      border-radius: 50%; 
      cursor: pointer; 
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    button svg { width: 20px; height: 20px; }
    button.active { background: var(--primary); border-color: var(--primary); box-shadow: 0 0 15px var(--primary); }
    button.active.mic { background: var(--secondary); border-color: var(--secondary); box-shadow: 0 0 15px var(--secondary); }
    button:hover { transform: scale(1.1); background: rgba(255,255,255,0.1); }
    
    #status { 
      position: absolute; 
      top: 15px; 
      left: 15px; 
      font-size: 0.65rem; 
      font-weight: 600;
      color: var(--text); 
      background: var(--card);
      padding: 4px 10px;
      border-radius: 20px;
      backdrop-filter: blur(5px);
      border: 1px solid rgba(255,255,255,0.05);
    }

    .placeholder {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at center, #1e293b, #0f172a);
      z-index: 1;
    }
    .placeholder.hidden { display: none; }
    .placeholder-icon {
      font-size: 3rem;
      margin-bottom: 10px;
      opacity: 0.5;
    }
    .placeholder-text {
      font-size: 0.8rem;
      color: #64748b;
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="status">Ready</div>
    <div id="placeholder" class="placeholder">
      <div class="placeholder-icon">🎥</div>
      <div class="placeholder-text">Camera is Off</div>
    </div>
    <video id="video" autoplay playsinline muted></video>
    <div class="controls">
      <button id="toggleCam" title="Toggle Camera">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
      </button>
      <button id="toggleMic" class="mic" title="Toggle Microphone">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
      </button>
    </div>
  </div>
  <script src="../config.js"></script>
  <script src="script.js"></script>
</body>
</html>
